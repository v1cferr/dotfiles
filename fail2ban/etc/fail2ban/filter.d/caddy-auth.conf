# Fail2ban filter — falhas de basic_auth no Caddy.
# Casa linhas do access-log JSON do Caddy com status 401 no host do dashboard
# (o basic_auth só devolve 401 quando a senha está errada => brute-force).
[Definition]
failregex = "remote_ip":"<HOST>",.+?"host":"dash\.v1cferr\.dev",.+?"status":401,
journalmatch = _SYSTEMD_UNIT=caddy.service
