general {
    # `pidof ... ||` evita subir um segundo hyprlock por cima de um já ativo:
    # duas superfícies de session-lock confundem o grab do teclado e o campo
    # de senha para de digitar (sintoma clássico ao acordar do dpms off).
    lock_cmd = pidof hyprlock || hyprlock
    # Trava via logind (dispara o lock_cmd acima, já protegido) em vez de
    # chamar hyprlock direto. Defensivo: este desktop só liga/desliga (sem
    # suspend/hibernate), mas se um dia suspender, ao menos tranca antes.
    before_sleep_cmd = loginctl lock-session
    # SEM `after_sleep_cmd = dpms on`: religar o output no resume é o MESMO
    # gatilho do freeze do page-flip atomic da NVIDIA (ver listener abaixo).
    # Como não se usa suspend aqui era só um landmine — e no resume o compositor
    # já reinicializa os outputs sozinho (modeset do DRM), então era redundante.
    ignore_dbus_inhibit = true
    ignore_systemd_inhibit = false
}

# Escurece a tela AOS 3 MIN (AFK), ANTES do lock dos 5 min — assim o quarto já
# fica no escuro e quando o lock entra a tela está preta (o gamma é do output,
# independente do hyprlock, então ele trava "por baixo" sem reacender).
# Via GAMMA do hyprsunset, NUNCA dpms.
# `dpms on` (religar o output ao voltar do AFK) com o hyprlock por cima trava o
# page-flip atomic da NVIDIA -> aquamarine loga "failed to commit: Device or
# resource busy ... PAGE_FLIP_EVENT", nenhum frame novo é apresentado e a tela
# CONGELA (relógio para, senha não entra, só sai com reboot). Por isso o dpms
# está DESCARTADO aqui (era guardado por `pidof hyprlock ||`, então com o lock
# aos 300s nunca rodava — a tela não apagava). Gamma só mexe na LUT de cor (o
# mesmo caminho do brilho/teclas F, ver brightness-osd.sh) — não reconfigura o
# output, não dispara page-flip — então escurece com SEGURANÇA. O script salva o
# brilho atual, zera (tela preta) e restaura ao voltar.
#   Obs.: escurece, NÃO desliga o monitor (sem backlight/DDC; dpms fora). Funciona
#   tanto bloqueado quanto não. vrr=2 (look-and-feel) já tirou o VRR do lock.
listener {
    timeout = 180
    on-timeout = /home/v1cferr/.config/hypr/scripts/idle-dim.sh dim
    on-resume = /home/v1cferr/.config/hypr/scripts/idle-dim.sh restore
}

# Bloqueia a tela após 5 minutos de inatividade (AFK), já com a tela escura
# (dim dos 3 min acima). loginctl lock-session -> lock_cmd (protegido), nunca
# duplica o hyprlock.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

