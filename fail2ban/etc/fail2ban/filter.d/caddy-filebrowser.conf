# Fail2ban filter — falhas de login do FileBrowser (files.v1cferr.dev) via Caddy.
# O FileBrowser devolve 403 num POST /api/login com credenciais erradas.
[Definition]
failregex = "remote_ip":"<HOST>",.+?"host":"files\.v1cferr\.dev",.+?"uri":"/api/login".+?"status":403,
journalmatch = _SYSTEMD_UNIT=caddy.service
