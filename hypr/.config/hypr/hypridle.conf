general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = true
    ignore_systemd_inhibit = false
}

# Bloqueia a tela após 5 minutos de inatividade (AFK)
listener {
    timeout = 300
    on-timeout = hyprlock
}

# Apaga a tela 5 minutos depois do lock (10 min total de inatividade)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

