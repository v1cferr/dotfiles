# ============================================================================
#  hyprlock — tela de bloqueio (SUPER+L e hypridle)
# ----------------------------------------------------------------------------
#  Layout para dois monitores:
#    DP-1     (principal)  -> desktop borrado + relógio + campo de senha
#    HDMI-A-1 (secundário) -> imagem ESTÁTICA (era GIF animado; o reload ~10x/s
#                             fazia o hyprlock crashar no exit — ver nota abaixo)
#
#  Paleta Tokyo Night, casando com o greeter do greetd.
#  Ref: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
# ============================================================================

$font = JetBrainsMono Nerd Font

# Monitores
$primary   = DP-1
$secondary = HDMI-A-1

# Tokyo Night
$bg      = rgba(26, 27, 38, 0.85)    # #1a1b26
$fg      = rgb(192, 202, 245)        # #c0caf5
$muted   = rgb(86, 95, 137)          # #565f89
$blue    = rgba(7aa2f7ee)
$magenta = rgba(bb9af7ee)
$green   = rgba(9ece6aee)
$red     = rgba(f7768eee)

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOut, 0.25, 1, 0.5, 1
    animation = fadeIn, 1, 4, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

# ----------------------------------------------------------------------------
# MONITOR PRINCIPAL — desktop borrado + login
# ----------------------------------------------------------------------------
# NÃO usar `path = screenshot`: ele captura a tela via screencopy/DMA
# (CScreencopyFrame -> CSCDMAFrame). Ao acordar do dpms off a saída é
# reconfigurada, o CAsyncResourceManager cai num caminho de erro e o hyprlock
# segfalha destruindo o frame DMA no exit() — deixando a sessão travada e
# congelada (lockout). Wallpaper estático borrado evita esse caminho por
# completo. (bt: ImplBase.hpp:58 em ~CUniquePointer<CSCDMAFrame>, hyprlock 0.9.5)
background {
    monitor = $primary
    # mesmo estilo do greeter (arch_hero_flipped, borrado + escurecido). Aqui o
    # hyprlock faz blur/brilho nativos, então apontamos pro PNG nítido original
    # (o greeter pré-processa com ImageMagick só porque o compositor dele tem
    # blur desligado — ver scripts/greetd/deploy.sh).
    path = /home/v1cferr/Pictures/Wallpapers/arch_hero_flipped.png
    blur_passes = 3
    blur_size = 6
    noise = 0.012
    contrast = 0.92
    brightness = 0.55
    vibrancy = 0.17
}

# Relógio (com segundos)
label {
    monitor = $primary
    text = cmd[update:1000] date +"%H:%M:%S"
    color = $fg
    font_size = 130
    font_family = $font ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# Data completa em pt-BR (capitalizada) + número da semana
label {
    monitor = $primary
    text = cmd[update:60000] LC_TIME=pt_BR.UTF-8 date +"%A, %d de %B de %Y  ·  Semana %V" | sed 's/./\u&/'
    color = $muted
    font_size = 22
    font_family = $font
    position = 0, 110
    halign = center
    valign = center
}

# Saudação
label {
    monitor = $primary
    text =   $USER
    color = $fg
    font_size = 16
    font_family = $font
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    monitor = $primary
    size = 340, 56
    outline_thickness = 2
    rounding = 14

    inner_color = $bg
    font_color = $fg
    font_family = $font

    outer_color = $blue $magenta 45deg
    check_color = $green $blue 120deg
    fail_color = $red

    placeholder_text = <span foreground="##565f89">Enter password…</span>
    fail_text = <span foreground="##f7768e">$PAMFAIL</span>

    dots_spacing = 0.3
    fade_on_empty = false

    position = 0, -190
    halign = center
    valign = center
}

# Quote PT-BR no canto inferior — troca a cada lock E a cada 2.5 min (igual
# ao GIF). O label roda a cada 10s, mas o script só troca a quote quando
# passam 150s (a maioria das chamadas só relê o cache).
label {
    monitor = $primary
    text = cmd[update:10000] /home/v1cferr/.config/hypr/scripts/lockscreen_quote.sh
    color = rgba(c0caf5cc)
    font_size = 13
    font_family = $font
    position = 40, 40
    halign = left
    valign = bottom
}

# Clima (canto superior esquerdo) — fonte MSN. O label roda a cada 3s mas é
# barato (só lê cache); a rede só é tocada a cada 10 min, em segundo plano.
label {
    monitor = $primary
    text = cmd[update:3000] /home/v1cferr/.config/hypr/scripts/lockscreen_weather.sh
    color = $fg
    font_size = 18
    font_family = $font
    position = 40, -40
    halign = left
    valign = top
}

# Notificações (canto superior direito) — só a contagem do swaync, a cada 5 s
label {
    monitor = $primary
    text = cmd[update:5000] /home/v1cferr/.config/hypr/scripts/lockscreen_notifs.sh
    color = $fg
    font_size = 16
    font_family = $font
    position = -40, -40
    halign = right
    valign = top
}

# ----------------------------------------------------------------------------
# MONITOR SECUNDÁRIO — GIF animado, sem login
# ----------------------------------------------------------------------------
# Imagem ESTÁTICA — nada de GIF/reload aqui. O GIF animado era um widget
# `image` com reload_cmd disparado ~10x/s por um pacer (SIGUSR2). Cada reload
# alimentava o CAsyncResourceGatherer do hyprlock e, no momento do unlock, essa
# thread assíncrona ainda decodando um frame (Hyprgraphics::formatFromFile via
# libmagic) corria com o exit() -> heap corrompido -> SIGABRT/coredump ao sair
# (recorrente mai–jun/2026, confirmado por backtrace simbolizado). É a MESMA
# classe do crash do `path=screenshot`/DMA já mitigado no monitor principal:
# qualquer trabalho assíncrono contínuo do hyprlock corre com o exit nessa NVIDIA.
# Estático = zero gatherer = sem race = sem crash. Troque o path à vontade
# (ex.: jaynit-samurai-bridge, kvacm-torii-city, era7-city-of-the-amethyst-nights).
# O script lockscreen_gif_frame.sh e ~/Pictures/Wallpapers/lockscreen-gifs/
# ficaram órfãos — manter pra reverter, ou apagar depois.
background {
    monitor = $secondary
    color = rgba(1a1b26ff)
    path = /home/v1cferr/Pictures/Wallpapers/arseniy-chebynkin-tokyo-street-night.jpg
}

# Cadeado discreto no canto
label {
    monitor = $secondary
    text = 󰌾
    color = rgba(c0caf5aa)
    font_size = 28
    font_family = $font
    position = -40, -30
    halign = right
    valign = top
}
