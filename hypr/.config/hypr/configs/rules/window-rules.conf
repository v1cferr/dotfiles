##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Bind / reservar workspaces para monitores
workspace = 1,monitor:DP-1,default:true,persistent:true
workspace = 2,monitor:DP-1,persistent:true
workspace = 3,monitor:DP-1,persistent:true
workspace = 4,monitor:DP-1,persistent:true

workspace = 5,monitor:HDMI-A-1,default:false,persistent:true
workspace = 6,monitor:HDMI-A-1,persistent:true
workspace = 7,monitor:HDMI-A-1,persistent:true
workspace = 8,monitor:HDMI-A-1,persistent:true

# Global window opacity rule
# Sets transparency for all application windows:
# - Active/focused windows: 96% opacity (0.96) - melhor contraste do texto, wallpaper sutil
# - Inactive/unfocused windows: 91% opacity (0.91) - mais escuro para hierarquia visual
# - Applies to all window classes using the wildcard pattern '.*'
# Perfect balance between text contrast and subtle wallpaper visibility
windowrule = opacity 0.98 0.96, match:class .*

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = suppress_event activate activatefocus, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0

# flameshot 14+: o fix antigo de multi-display (janela esticada pelos dois
# monitores) ficou OBSOLETO — a doc diz que só vale pra versões < 14.
# No v14 o fluxo é: picker de monitor (janela normal) -> overlay fullscreen
# no monitor escolhido. Forçar monitor/move/size quebra esse fluxo; aqui só
# deixamos o picker flutuando centralizado no monitor focado, sem animação.
#
# GLITCH pós-captura (wallpaper aparecia ~1s ao fechar o overlay): o
# flameshot pedia fullscreen real (fs=2), e nesse modo o Hyprland esconde
# as janelas em tiling do workspace; ao fechar, ele saía do fullscreen e
# re-renderizava tudo, mostrando o wallpaper por um instante antes dos apps
# voltarem. suppress_event=fullscreen mantém o overlay como janela flutuante
# (fs=0) sobre o desktop, sem esconder/restaurar nada -> troca limpa.
# (A cobertura total da tela é forçada pelo flameshot-pick-monitor.sh com
# movewindowpixel exact, já que flutuante respeitaria a reserva da waybar.)
#
# opacity/blur/shadow também forçados: o overlay carrega um frame congelado
# da tela; sem isso herdaria a regra global (opacity .96 + blur) e ficaria
# semi-transparente sobre o desktop ao vivo.
windowrule {
    name = flameshot-v14-overlay
    match:class = flameshot

    no_anim = on
    float = on
    center = on
    pin = off
    opacity = 1.0 override 1.0 override
    no_blur = on
    no_shadow = on
    rounding = 0
    suppress_event = fullscreen
}

# Remove transparency for Picture-in-Picture window
windowrule = opacity 1.0, match:title ^(Picture-in-Picture)$
