general {
    # `pidof ... ||` evita subir um segundo hyprlock por cima de um já ativo:
    # duas superfícies de session-lock confundem o grab do teclado e o campo
    # de senha para de digitar (sintoma clássico ao acordar do dpms off).
    lock_cmd = pidof hyprlock || hyprlock
    # Trava via logind (dispara o lock_cmd acima, já protegido) em vez de
    # chamar hyprlock direto — assim o keybind e o sleep usam o mesmo caminho.
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = true
    ignore_systemd_inhibit = false
}

# Bloqueia a tela após 5 minutos de inatividade (AFK).
# loginctl lock-session -> lock_cmd (protegido), nunca duplica o hyprlock.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Apaga a tela 5 minutos depois do lock (10 min total de inatividade)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

