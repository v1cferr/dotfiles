# Porta customizada para SSH
Port 2222

# Segurança
PermitRootLogin no
# Acesso por SENHA de qualquer lugar (preferência do usuário).
# Exposto na internet (port-forward 2222 no OpenWrt) -> protegido por fail2ban.
PasswordAuthentication yes
KbdInteractiveAuthentication no
PubkeyAuthentication yes
MaxAuthTries 3

# Performance
UseDNS no
