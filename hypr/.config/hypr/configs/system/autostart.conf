#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Move workspace 1 to monitor DP-1 after 2 seconds (to ensure monitors are ready)
exec-once = bash -c "sleep 2 && hyprctl dispatch moveworkspacetomonitor 1 DP-1"

# xsettingsd (GTK settings daemon for dark theme)
exec-once = xsettingsd &

# Quickshell (barra + painéis VPN/Mpris/OSD). Precisa subir CEDO, antes de
# qualquer app de tray (dropbox, swaync, arch-update, blueman, flameshot,
# udiskie, nm-applet), pra ganhar o StatusNotifierWatcher e popular o tray
# limpo já no login. Toggle dos painéis via "qs ipc call <alvo> toggle".
exec-once = qs &

# Waybar REMOVIDA (substituída pela barra Quickshell). Histórico no git.

# Hypridle (idle management - screen locking, etc.)
exec-once = hypridle &
# Não bloqueia a tela enquanto houver mídia tocando (solta ao pausar/parar)
exec-once = ~/.config/hypr/scripts/media-idle-inhibitor.sh &

# Dropbox (cloud storage)
exec-once = dropbox &

# Hyprpaper (wallpapers) - needs to be running for wallpaper scripts to work
exec-once = hyprpaper &
exec-once = sleep 1 && ~/.config/hypr/scripts/change_wallpapers.sh

# Notificações: o Quickshell é o daemon org.freedesktop.Notifications
# (serviço Notifs.qml + UI Notifications.qml), sobe junto com o `qs` acima.
# SwayNC aposentado (substituía o Mako); histórico no git.

# Cliphist (clipboard manager)
exec-once = wl-paste --type text --watch cliphist store -max-items 200 -max-dedupe-search 200 # Stores only text data (cap 200 + janela de dedupe 200)
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

# Arch Update (system update notifier)
exec-once = arch-update --tray &

# File manager
exec-once = thunar --daemon &

# Bluetooth manager
# Source: https://wiki.archlinux.org/title/Blueman
exec-once = blueman-applet &

# Udiskie (automounting of drives) - https://github.com/coldfix/udiskie
exec-once = udiskie &

# Flameshot (screenshot tool)
exec-once = flameshot &

# Hyprsunset (blue light filter)
exec-once = hyprsunset &

# Toggle hyprsunset on fullscreen (auto disable/enable)
exec-once = /home/v1cferr/dotfiles/hypr/scripts/toggle_hyprsunset.sh &

# Network manager applet (for managing Wi-Fi, etc.)
exec-once = nm-applet --indicator &

# Força DPI 1600 no mouse Razer (DeathAdder V2 sem serial enumera como UNKNOWN
# e o OpenRazer aplica o default 1800; o script reaplica via daemon todo login)
exec-once = ~/.config/hypr/scripts/set-mouse-dpi.sh 1600 &

# Auto wallpaper changer (optional - uncomment to enable)
# exec-once = ~/.config/hypr/scripts/auto_wallpaper.sh &

# DBus & Systemd environment update for Wayland/keyring compatibility
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Polkit authentication agent (prompts for passwords/keyring unlocking)
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
