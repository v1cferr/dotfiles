# ============================================================================
#  FileBrowser - gerenciador de arquivos web (files.v1cferr.dev)
#  Exposto na internet via Caddy; tem login próprio. Pastas de dados montadas
#  READ-ONLY (baixar sim, alterar/apagar não).
# ============================================================================
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3004:80"   # só loopback; quem publica é o Caddy
    volumes:
      - /home/v1cferr/Documents:/srv/Documents:ro
      - /home/v1cferr/Downloads:/srv/Downloads:ro
      - /home/v1cferr/Videos:/srv/Videos:ro
      - /home/v1cferr/Pictures:/srv/Pictures:ro
      - /home/v1cferr/Music:/srv/Music:ro
      - /home/v1cferr/Dropbox:/srv/Dropbox:ro
      - /home/v1cferr/Torrents:/srv/Torrents:ro
      - ./database:/database   # persiste o banco (usuários/senha) no host
