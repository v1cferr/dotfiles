# ============================================================================
#  greetd — display manager mínimo (substitui o SDDM)
# ----------------------------------------------------------------------------
#  O greeter é um Hyprland mínimo (rodando como o usuário `greeter`) que sobe o
#  quickshell em /etc/greetd/quickshell/greeter.qml. A sessão REAL não é lançada
#  aqui: o greeter chama Greetd.launch(["uwsm","start",...]) após autenticar, pra
#  a sessão continuar uwsm-managed (portal/flameshot dependem disso).
#
#  vt = 2 de propósito: tty1 fica livre pra console/recovery e não há corrida com
#  o branch de autostart do ~/.zprofile (XDG_VTNR -eq 1).
#
#  Deploy:  sudo ~/dotfiles/scripts/greetd/deploy.sh
# ============================================================================

[terminal]
vt = 2

[default_session]
command = "Hyprland --config /etc/greetd/hyprland-greeter.conf"
user = "greeter"
