general {
    # `pidof ... ||` evita subir um segundo hyprlock por cima de um já ativo:
    # duas superfícies de session-lock confundem o grab do teclado e o campo
    # de senha para de digitar (sintoma clássico ao acordar do dpms off).
    lock_cmd = pidof hyprlock || hyprlock
    # Trava via logind (dispara o lock_cmd acima, já protegido) em vez de
    # chamar hyprlock direto — assim o keybind e o sleep usam o mesmo caminho.
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = true
    ignore_systemd_inhibit = false
}

# Bloqueia a tela após 5 minutos de inatividade (AFK).
# loginctl lock-session -> lock_cmd (protegido), nunca duplica o hyprlock.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Apaga a tela por inatividade — SÓ quando a sessão NÃO está bloqueada.
# Reconfigurar o output (dpms on, ao voltar do AFK) com o hyprlock por cima trava
# o page-flip atomic da NVIDIA -> aquamarine loga "Cannot commit when a page-flip
# is awaiting" / "failed to commit: Device or resource busy ... PAGE_FLIP_EVENT",
# nenhum frame novo é apresentado e a tela CONGELA (relógio para, senha não entra,
# só sai com reboot). O `pidof hyprlock ||` aborta o dpms enquanto bloqueado.
# Como o lock entra aos 300s (antes destes 600s), na prática a tela deixa de
# apagar sozinha no AFK — trade-off aceito para não travar. vrr=2 (look-and-feel)
# já tirou o VRR do lock; isto remove o gatilho que sobrava (a reconfiguração).
listener {
    timeout = 600
    on-timeout = pidof hyprlock || hyprctl dispatch dpms off
    on-resume = pidof hyprlock || hyprctl dispatch dpms on
}

