# ============================================================================
#  Homepage — dashboard central do homelab
#  Exposto SÓ na LAN via Caddy (dash.v1cferr.dev). Ver Caddyfile no dotfiles.
# ============================================================================
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      # Só no loopback do host — quem publica (e restringe à LAN) é o Caddy.
      - "127.0.0.1:3003:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: dash.v1cferr.dev
      PUID: 1000
      PGID: 1000
    volumes:
      - ./config:/app/config
    depends_on:
      - dockerproxy

  # Expõe a API do Docker em modo READ-ONLY (apenas /containers) para o
  # Homepage, em vez de montar /var/run/docker.sock direto no Homepage
  # (socket cru = equivalente a root). Princípio do menor privilégio.
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: homepage-dockerproxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
