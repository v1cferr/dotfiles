# ============================================================================
#  Hyprland MÍNIMO do greeter (greetd) — roda como usuário `greeter`
# ----------------------------------------------------------------------------
#  Só o necessário pra subir um compositor estável no Nvidia e abrir o quickshell
#  greeter. Sem waybar/hypridle/hyprpaper/scripts do usuário. O fundo é pintado
#  pelo próprio greeter (wallpaper borrado vindo do coletor root).
# ============================================================================

# --- Monitores: geometria idêntica à sessão real ---------------------------
#  DP-1 (primário, 144Hz, à direita) = login + painel; HDMI-A-1 (TV, à esquerda) = GIF
monitor = HDMI-A-1,1920x1080@60,0x0,1
monitor = DP-1,1920x1080@144,1920x0,1

# --- Env Nvidia (driver moderno, single-GPU; sem hacks GBM/AQ_DRM) ----------
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = XCURSOR_SIZE,20
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,20

# --- Teclado: igual à sessão real, senão a senha digita errado --------------
input {
    kb_layout = br
    kb_variant = abnt2
    kb_options =
    repeat_rate = 40
    repeat_delay = 400
}

# --- Visual mínimo / estável ------------------------------------------------
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}
decoration {
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}
animations {
    enabled = false
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = 0x1a1b26
}

# --- Sobe o greeter quickshell ----------------------------------------------
exec-once = qs -p /etc/greetd/quickshell/greeter.qml

# --- Recovery: sai do compositor (greetd reinicia o greeter) ----------------
bind = CTRL ALT, Delete, exit
