# ============================================================================
#  hyprlock — tela de bloqueio (SUPER+L e hypridle)
# ----------------------------------------------------------------------------
#  Layout para dois monitores:
#    DP-1     (principal)  -> desktop borrado + relógio + campo de senha
#    HDMI-A-1 (secundário) -> GIF animado (frames ciclados via reload_cmd,
#                             ver scripts/lockscreen_gif_frame.sh)
#
#  Paleta Tokyo Night, casando com o tema do SDDM.
#  Ref: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
# ============================================================================

$font = JetBrainsMono Nerd Font

# Monitores
$primary   = DP-1
$secondary = HDMI-A-1

# Tokyo Night
$bg      = rgba(26, 27, 38, 0.85)    # #1a1b26
$fg      = rgb(192, 202, 245)        # #c0caf5
$muted   = rgb(86, 95, 137)          # #565f89
$blue    = rgba(7aa2f7ee)
$magenta = rgba(bb9af7ee)
$green   = rgba(9ece6aee)
$red     = rgba(f7768eee)

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOut, 0.25, 1, 0.5, 1
    animation = fadeIn, 1, 4, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

# ----------------------------------------------------------------------------
# MONITOR PRINCIPAL — desktop borrado + login
# ----------------------------------------------------------------------------
background {
    monitor = $primary
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.012
    contrast = 0.92
    brightness = 0.55
    vibrancy = 0.17
}

# Relógio
label {
    monitor = $primary
    text = cmd[update:1000] date +"%H:%M"
    color = $fg
    font_size = 130
    font_family = $font ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# Data (en-US) + número da semana
label {
    monitor = $primary
    text = cmd[update:60000] LC_TIME=en_US.UTF-8 date +"%A, %B %d  ·  Week %V"
    color = $muted
    font_size = 22
    font_family = $font
    position = 0, 110
    halign = center
    valign = center
}

# Saudação
label {
    monitor = $primary
    text =   $USER
    color = $fg
    font_size = 16
    font_family = $font
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    monitor = $primary
    size = 340, 56
    outline_thickness = 2
    rounding = 14

    inner_color = $bg
    font_color = $fg
    font_family = $font

    outer_color = $blue $magenta 45deg
    check_color = $green $blue 120deg
    fail_color = $red

    placeholder_text = <span foreground="##565f89">Enter password…</span>
    fail_text = <span foreground="##f7768e">$PAMFAIL</span>

    dots_spacing = 0.3
    fade_on_empty = false

    position = 0, -190
    halign = center
    valign = center
}

# Quote PT-BR no canto inferior — uma nova a cada lock
# (cmd[] sem update roda uma única vez, na inicialização do hyprlock)
label {
    monitor = $primary
    text = cmd[] /home/v1cferr/.config/hypr/scripts/lockscreen_quote.sh
    color = rgba(c0caf5cc)
    font_size = 13
    font_family = $font
    position = 40, 40
    halign = left
    valign = bottom
}

# Clima (canto superior esquerdo) — fonte MSN, atualiza a cada 10 min
label {
    monitor = $primary
    text = cmd[update:600000] /home/v1cferr/.config/hypr/scripts/lockscreen_weather.sh
    color = $fg
    font_size = 18
    font_family = $font
    position = 40, -40
    halign = left
    valign = top
}

# Notificações (canto superior direito) — só a contagem do swaync, a cada 5 s
label {
    monitor = $primary
    text = cmd[update:5000] /home/v1cferr/.config/hypr/scripts/lockscreen_notifs.sh
    color = $fg
    font_size = 16
    font_family = $font
    position = -40, -40
    halign = right
    valign = top
}

# ----------------------------------------------------------------------------
# MONITOR SECUNDÁRIO — GIF animado, sem login
# ----------------------------------------------------------------------------
background {
    monitor = $secondary
    color = rgba(1a1b26ff)
}

# GIF em tela cheia. É um widget image (e não background) porque a troca de
# frame no image é instantânea — o background faz crossfade usando a config
# do fadeIn, o que borraria a animação. reload_time=0 NÃO significa "o mais
# rápido possível": planta um timer force-only que só dispara com SIGUSR2
# (ver o label pacer abaixo). size = altura; largura segue o aspecto (16:9).
image {
    monitor = $secondary
    path = /home/v1cferr/Pictures/Wallpapers/acoolrocket-dalle2-hokusai-non-prompt-landscape.png
    size = 1080
    rounding = 0
    border_size = 0
    reload_time = 0
    reload_cmd = /home/v1cferr/.config/hypr/scripts/lockscreen_gif_frame.sh
    position = 0, 0
    halign = center
    valign = center
}

# Pacer da animação: a cada 100ms manda SIGUSR2 pro hyprlock, que dispara os
# timers force-only (o reload do image acima). Sem isso o GIF fica estático.
# O label em si é invisível (pkill não imprime nada).
label {
    monitor = $secondary
    text = cmd[update:100] pkill -USR2 -x hyprlock
    font_size = 1
    position = 0, 0
    halign = left
    valign = bottom
}

# Cadeado discreto no canto
label {
    monitor = $secondary
    text = 󰌾
    color = rgba(c0caf5aa)
    font_size = 28
    font_family = $font
    position = -40, -30
    halign = right
    valign = top
}
